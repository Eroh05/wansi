<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finals Task Lab 1</title>

<style>
    body {
        height: 3000px;
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;

        display: flex;
        justify-content: center;
        align-items: center;
    }
    .close-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        background: black;
        color: white;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        font-weight: bold;
    }
    .fixed-box {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 320px;
        height: 180px;
        background: gray;
    }
    .product-container {
        position: relative;
        display: inline-block;
        background: #ddd;
        padding: 20px;
        text-align: center;
        overflow: hidden;
    }

    .product-container img {
        width: 300px;
        display: block;
    }

    /* DISCOUNT */
    .discount {
        position: absolute;
        top: 10px;
        right: 10px;
        background: black;
        color: white;
        padding: 5px 10px;
        font-size: 14px;
    }
    .overlay {
        position: absolute;
        bottom: -100%;
        left: 0;
        width: 100%;
        height: 40%;
        background: rgba(255,255,255,0.8);
        display: flex;
        justify-content: center;
        align-items: center;
        transition: 0.4s ease;
    }
    .product-container:hover .overlay {
        bottom: 0;
    }
    .overlay button {
        padding: 10px 20px;
        border: 1px solid black;
        background: white;
        cursor: pointer;
        transition: 0.3s;
    }

    .overlay button:hover {
        background: black;
        color: white;
    }
</style>
</head>

<body>

<div class="close-btn">X</div>

<div class="fixed-box"></div>

<div class="product-container">
    <img src="shirt.jpg" alt="Shirt">

    <div class="discount">20% OFF</div>

    <div class="overlay">
        <button>Add to Cart</button>
    </div>
</div>

</body>
</html>
